<!doctype html><html><head><meta charset="utf-8"/><title>Passware</title><script>(function () {
                if (!process.env.HOT) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = './main.css';
                    // HACK: Writing the script path should be done with webpack
                    document.getElementsByTagName('head')[0].appendChild(link);
                }
            })();</script></head><body class="theme-light"><div id="root"></div><script>{
                const script = document.createElement('script');
                const port = process.env.PORT || 3000;
                script.src = process.env.HOT ? 'http://localhost:' + port + '/bundle.js' : './bundle.js';
                // HACK: Writing the script path should be done with webpack
                document.body.appendChild(script);
            }</script></body></html>
